<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

.philosophy-section {
    background-color: #0f172a; /* 가장 깊고 어두운 남색 톤으로 전체 통일 */
    padding: 100px 20px;
    font-family: 'Pretendard', sans-serif;
    text-align: center;
    color: #ffffff;
}

.philosophy-top-text {
    color: #ef4444; 
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 2px;
    margin-bottom: 15px;
}

.philosophy-main-title {
    font-size: 46px;
    font-weight: 900;
    color: #ffffff; /* 흰색 글씨로 눈에 띄게 */
    letter-spacing: -1.5px;
    margin-bottom: 70px;
}

.philosophy-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    max-width: 1100px;
    margin: 0 auto;
}

/* 개별 가치 카드 (어두운 배경용) */
.philosophy-card {
    background: #1e293b; /* 배경보다 살짝 밝은 다크톤 카드 */
    padding: 50px 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3); /* 그림자도 어둡게 세팅 */
    border-top: 5px solid #334155; /* 평소엔 차분한 회색 테두리 */
    transition: transform 0.3s ease, border-top-color 0.3s ease;
}

.philosophy-card:hover {
    transform: translateY(-10px);
    border-top-color: #ef4444; /* 마우스 올리면 강렬한 레드로 변신 */
}

.philosophy-keyword {
    font-size: 32px;
    font-weight: 800;
    color: #ffffff;
    margin-bottom: 25px;
    display: inline-block;
    position: relative;
}

.philosophy-keyword::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 35px;
    height: 4px;
    background-color: #ef4444;
    border-radius: 2px;
}

.philosophy-desc {
    font-size: 16px;
    line-height: 1.6;
    color: #cbd5e1; /* 어두운 배경에서 가장 읽기 편한 밝은 회색 */
    word-break: keep-all;
    margin-top: 20px;
}

@media (max-width: 768px) {
    .philosophy-grid { grid-template-columns: 1fr; gap: 20px; }
    .philosophy-main-title { font-size: 34px; margin-bottom: 50px; }
    .philosophy-card { padding: 40px 20px; }
}
</style>

<div class="philosophy-section">
    <div class="philosophy-top-text">기업이념</div>
    <div class="philosophy-main-title">위기에서 일상으로</div>
    
    <div class="philosophy-grid">
        <div class="philosophy-card">
            <div class="philosophy-keyword">정직</div>
            <div class="philosophy-desc">투명한 견적과 속임 없는 정직한 시공으로 고객과의 신뢰를 최우선으로 생각합니다.</div>
        </div>
        
        <div class="philosophy-card">
            <div class="philosophy-keyword">열정</div>
            <div class="philosophy-desc">어떠한 참혹하고 극한의 현장이라도 절대 포기하지 않는 투철한 사명감으로 임합니다.</div>
        </div>
        
        <div class="philosophy-card">
            <div class="philosophy-keyword">배려</div>
            <div class="philosophy-desc">남겨진 유가족과 피해자의 아픈 마음을 깊이 헤아리고 가족의 일처럼 따뜻하게 공감합니다.</div>
        </div>
    </div>
</div>
